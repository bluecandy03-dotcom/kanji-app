<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="한자 분석기">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>한자 분석기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
#setup{align-items:center;justify-content:center;padding:2rem;background:#fff}
.setup-logo{font-size:56px;margin-bottom:1.5rem}
.setup-title{font-size:24px;font-weight:600;margin-bottom:.5rem}
.setup-sub{font-size:14px;color:#888;margin-bottom:2.5rem;text-align:center}
.setup-label{font-size:13px;color:#555;margin-bottom:8px;align-self:flex-start;width:100%;max-width:340px}
.setup-input{width:100%;max-width:340px;padding:14px 16px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:13px;font-family:monospace;color:#1a1a1a;background:#fafafa;margin-bottom:1rem;outline:none}
.setup-input:focus{border-color:#534AB7;background:#fff}
.btn-start{width:100%;max-width:340px;padding:16px;background:#534AB7;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.btn-start:active{background:#3C3489}
.setup-note{font-size:12px;color:#aaa;margin-top:1rem;text-align:center;max-width:300px;line-height:1.6}
#main{background:#f7f7f5}
.topbar{background:#fff;padding:16px 20px 12px;border-bottom:.5px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:18px;font-weight:600}
.topbar-settings{font-size:22px;cursor:pointer;color:#888;padding:4px}
.main-content{flex:1;padding:20px 16px;overflow-y:auto}
.upload-zone{background:#fff;border-radius:20px;border:2px dashed #d0cdf0;padding:32px 20px;text-align:center;cursor:pointer;margin-bottom:16px}
.upload-zone:active{background:#f5f4ff}
.upload-icon{font-size:48px;margin-bottom:12px}
.upload-text{font-size:16px;font-weight:500;color:#534AB7;margin-bottom:6px}
.upload-sub{font-size:13px;color:#aaa}
#fileInput{display:none}
.preview-wrap{margin-bottom:16px;position:relative;display:none}
.preview-wrap.show{display:block}
.preview-img{width:100%;max-height:280px;object-fit:contain;border-radius:16px;background:#fff;border:.5px solid #e8e8e8}
.preview-clear{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);color:white;border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-analyze{width:100%;padding:18px;background:#534AB7;color:white;border:none;border-radius:16px;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:20px;display:none}
.btn-analyze.show{display:block}
.btn-analyze:active{background:#3C3489}
.btn-analyze:disabled{background:#b0acd8}
.loading{display:none;text-align:center;padding:2rem}
.loading.show{display:block}
.loading-spinner{width:36px;height:36px;border:3px solid #e0dff8;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:#888}
.result{display:none}
.result.show{display:block}
.result-kanji-card{background:#fff;border-radius:20px;padding:24px 20px;margin-bottom:12px;border:.5px solid #ebebeb}
.kanji-display{font-size:64px;text-align:center;line-height:1.1;margin-bottom:16px}
.kanji-reading{text-align:center;font-size:18px;color:#534AB7;font-weight:500;margin-bottom:6px}
.kanji-meaning{text-align:center;font-size:15px;color:#555;margin-bottom:16px}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.tag{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500}
.tag-radical{background:#E1F5EE;color:#085041}
.tag-stroke{background:#EEEDFE;color:#3C3489}
.tag-level{background:#FAEEDA;color:#633806}
.info-card{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:12px;border:.5px solid #ebebeb}
.info-card-title{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.info-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.info-dot{width:6px;height:6px;border-radius:50%;background:#534AB7;margin-top:6px;flex-shrink:0}
.info-text{font-size:14px;color:#333;line-height:1.6}
.info-text .jp{color:#534AB7;font-weight:500}
.info-text .kr{color:#888;font-size:13px}
.similar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.similar-item{background:#f7f7f5;border-radius:14px;padding:14px 12px;text-align:center;cursor:pointer;border:1.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:4px}
.similar-item:active{background:#EEEDFE;border-color:#AFA9EC}
.similar-kanji{font-size:30px;color:#1a1a1a;display:block}
.similar-read{font-size:12px;color:#534AB7;font-weight:500}
.similar-meaning{font-size:12px;color:#888}
.similar-diff{font-size:11px;color:#aaa;margin-top:2px;line-height:1.4}
.similar-arrow{font-size:11px;color:#bbb;margin-top:4px}
.btn-reset{width:100%;padding:14px;background:transparent;color:#534AB7;border:1.5px solid #534AB7;border-radius:14px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px;margin-bottom:24px}
.btn-reset:active{background:#f0efff}
.error-box{background:#FCEBEB;color:#791F1F;border-radius:12px;padding:14px 16px;font-size:14px;margin-bottom:16px;line-height:1.6;display:none;white-space:pre-wrap}
.error-box.show{display:block}
.debug-box{background:#fff3cd;color:#856404;border-radius:12px;padding:12px 16px;font-size:12px;margin-bottom:12px;display:none;word-break:break-all}
.debug-box.show{display:block}
</style>
</head>
<body>

<div id="setup" class="screen active">
  <div class="setup-logo">漢</div>
  <div class="setup-title">한자 분석기</div>
  <div class="setup-sub">사진 한 장으로 한자를 완전히 이해해요</div>
  <div class="setup-label">Anthropic API 키를 입력해주세요</div>
  <input class="setup-input" type="text" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
  <button class="btn-start" onclick="saveAndStart()">시작하기</button>
  <div class="setup-note">API 키는 이 기기에만 저장돼요. console.anthropic.com에서 발급받을 수 있어요.</div>
</div>

<div id="main" class="screen">
  <div class="topbar">
    <span class="topbar-title">漢 한자 분석기</span>
    <span class="topbar-settings" onclick="goSetup()">⚙️</span>
  </div>
  <div class="main-content">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📷</div>
      <div class="upload-text">사진 찍기 또는 이미지 선택</div>
      <div class="upload-sub">한자가 포함된 사진을 올려주세요</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" class="preview-img" alt="선택된 이미지">
      <button class="preview-clear" onclick="clearImage()">✕</button>
    </div>
    <div class="debug-box" id="debugBox"></div>
    <div class="error-box" id="errorBox"></div>
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">이 한자 분석하기 →</button>
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">한자를 분석하는 중...</div>
    </div>
    <div class="result" id="result"></div>
  </div>
</div>

<script>
var apiKey = '';
var imageBase64 = '';
var imageMime = 'image/jpeg';

function saveAndStart() {
  var raw = document.getElementById('apiKeyInput').value;
  var key = raw.trim();
  if (!key || key.length < 10) {
    alert('API 키를 입력해주세요.');
    return;
  }
  apiKey = key;
  try { localStorage.setItem('kanji_key', key); } catch(e) {}
  showScreen('main');
}

function goSetup() {
  showScreen('setup');
  document.getElementById('apiKeyInput').value = apiKey;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

window.addEventListener('load', function() {
  var saved = '';
  try { saved = localStorage.getItem('kanji_key') || ''; } catch(e) {}
  if (saved && saved.length > 10) {
    apiKey = saved;
    document.getElementById('apiKeyInput').value = saved;
    showScreen('main');
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
});

document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  loadFile(file);
  this.value = '';
});

function loadFile(file) {
  imageMime = file.type || 'image/jpeg';
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    imageBase64 = dataUrl.split(',')[1];
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewWrap').classList.add('show');
    document.getElementById('analyzeBtn').classList.add('show');
    document.getElementById('result').classList.remove('show');
    document.getElementById('errorBox').classList.remove('show');
    document.getElementById('debugBox').classList.remove('show');
    document.getElementById('result').innerHTML = '';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  imageBase64 = '';
  document.getElementById('previewWrap').classList.remove('show');
  document.getElementById('analyzeBtn').classList.remove('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('debugBox').classList.remove('show');
  document.getElementById('result').innerHTML = '';
}

async function callAPI(messages, system, hasImage) {
  var key = apiKey.trim();
  var body = {
    model: 'claude-opus-4-6',
    max_tokens: 1500,
    system: system,
    messages: messages
  };

  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-calls': 'true'
    },
    body: JSON.stringify(body)
  });

  var data = await res.json();
  if (!res.ok) {
    throw new Error((data.error && data.error.message) ? data.error.message : 'HTTP ' + res.status);
  }
  return data.content[0].text.trim();
}

var SYSTEM = '당신은 한자 전문가입니다. 반드시 JSON만 출력하고 다른 텍스트나 마크다운 코드블록은 절대 포함하지 마세요.';
var JSON_FORMAT = '{"characters":[{"kanji":"한자","readings":{"onyomi":["음독"],"kunyomi":["훈독"]},"meanings":["뜻1","뜻2"],"radical":{"char":"부수","name":"이름","meaning":"뜻"},"stroke_count":획수,"jlpt_level":"N3","example_words":[{"word":"예시","reading":"읽기","meaning":"뜻"},{"word":"예시2","reading":"읽기2","meaning":"뜻2"},{"word":"예시3","reading":"읽기3","meaning":"뜻3"}],"similar_kanji":[{"kanji":"비슷","reading":"읽기","meanings":["뜻"],"difference":"차이점"},{"kanji":"비슷2","reading":"읽기2","meanings":["뜻2"],"difference":"차이점2"}],"tip":"기억 팁"}]}';

async function analyze() {
  if (!imageBase64) return;
  var btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('debugBox').classList.remove('show');

  try {
    var text = await callAPI([{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
        { type: 'text', text: '이 이미지에 있는 한자를 분석해주세요. 가장 두드러진 한자 1-3개.\n\nJSON 형식:\n' + JSON_FORMAT }
      ]
    }], SYSTEM, true);

    var parsed = JSON.parse(text);
    renderResult(parsed, false);
  } catch(e) {
    showError(e.message);
  }

  document.getElementById('loading').classList.remove('show');
  btn.disabled = false;
}

async function analyzeKanjiText(kanji) {
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').innerHTML = '';
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  document.getElementById('loading').querySelector('.loading-text').textContent = kanji + ' 분석 중...';
  document.getElementById('loading').scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    var text = await callAPI([{
      role: 'user',
      content: '"' + kanji + '" 한자를 분석해주세요.\n\nJSON 형식:\n' + JSON_FORMAT
    }], SYSTEM, false);

    var parsed = JSON.parse(text);
    renderResult(parsed, true);
  } catch(e) {
    showError(e.message);
  }

  document.getElementById('loading').classList.remove('show');
  document.getElementById('loading').querySelector('.loading-text').textContent = '한자를 분석하는 중...';
}

function showError(msg) {
  var box = document.getElementById('errorBox');
  box.textContent = '오류: ' + msg + '\n\n키가 맞는지 ⚙️ 눌러서 확인해보세요.';
  box.classList.add('show');
}

function renderResult(data, fromText) {
  var chars = data.characters || [];
  if (!chars.length) {
    showError('한자를 찾지 못했어요. 더 선명한 사진으로 다시 시도해주세요.');
    return;
  }
  var html = '';
  chars.forEach(function(c) {
    var readings = [];
    if (c.readings && c.readings.onyomi && c.readings.onyomi.length) readings.push('음독: ' + c.readings.onyomi.join('、'));
    if (c.readings && c.readings.kunyomi && c.readings.kunyomi.length) readings.push('훈독: ' + c.readings.kunyomi.join('、'));
    var exHtml = (c.example_words || []).map(function(w) {
      return '<div class="info-row"><div class="info-dot"></div><div class="info-text"><span class="jp">' + w.word + '（' + w.reading + '）</span> <span class="kr">— ' + w.meaning + '</span></div></div>';
    }).join('');
    var simHtml = '';
    if (c.similar_kanji && c.similar_kanji.length) {
      var items = c.similar_kanji.slice(0, 4).map(function(s) {
        var m = (s.meanings && s.meanings.length) ? s.meanings.slice(0,2).join(', ') : '';
        var sk = s.kanji.replace(/'/g,"\\'");
        return '<div class="similar-item" onclick="analyzeKanjiText(\'' + sk + '\')">' +
          '<span class="similar-kanji">' + s.kanji + '</span>' +
          '<span class="similar-read">' + s.reading + '</span>' +
          (m ? '<span class="similar-meaning">' + m + '</span>' : '') +
          (s.difference ? '<span class="similar-diff">' + s.difference + '</span>' : '') +
          '<span class="similar-arrow">탭해서 분석 →</span></div>';
      }).join('');
      simHtml = '<div class="info-card"><div class="info-card-title">비슷한 한자</div><div class="similar-grid">' + items + '</div></div>';
    }
    var tipHtml = c.tip ? '<div class="info-card"><div class="info-card-title">기억 팁</div><div class="info-text" style="font-size:14px;line-height:1.7">💡 ' + c.tip + '</div></div>' : '';
    html += '<div class="result-kanji-card">' +
      '<div class="kanji-display">' + c.kanji + '</div>' +
      '<div class="kanji-reading">' + readings.join('　') + '</div>' +
      '<div class="kanji-meaning">' + (c.meanings || []).join(', ') + '</div>' +
      '<div class="tag-row">' +
        '<span class="tag tag-radical">부수: ' + (c.radical ? c.radical.char + ' ' + c.radical.name : '—') + '</span>' +
        '<span class="tag tag-stroke">' + (c.stroke_count || '?') + '획</span>' +
        (c.jlpt_level && c.jlpt_level !== '없음' ? '<span class="tag tag-level">JLPT ' + c.jlpt_level + '</span>' : '') +
      '</div></div>' +
      (exHtml ? '<div class="info-card"><div class="info-card-title">예시 단어</div>' + exHtml + '</div>' : '') +
      simHtml + tipHtml;
  });
  html += fromText
    ? '<button class="btn-reset" onclick="document.getElementById(\'result\').classList.remove(\'show\');window.scrollTo(0,0)">← 돌아가기</button>'
    : '<button class="btn-reset" onclick="clearImage()">다른 사진 분석하기</button>';
  var el = document.getElementById('result');
  el.innerHTML = html;
  el.classList.add('show');
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
